name: Deploy QinShiHuangMoments to AWS

on:
  push:
    branches:
      - main # Trigger deployment when code is pushed to the main branch

permissions:
  id-token: write # Required for AWS OIDC credentials authentication
  contents: read  # Required for checkout

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure NPM
        # 强制将 Token 写入到全局的 .npmrc 中
        run: |
          # 强制将所有 registry 指向官方，这会覆盖 lock 文件中的解析地址
          npm config set registry https://registry.npmjs.org/
          # echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          # echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      # Debug Token
      - name: Debug Token
        run: echo "Token length is ${#NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Step 3: Install dependencies and build project
      - name: Install Dependencies
        run: npm ci --loglevel verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Production Assets
        run: npm run build

      # Step 4: Configure AWS Credentials
      # Note: We support OIDC (recommended) or static Access Keys.
      # Un-comment/re-configure according to your IAM setup.
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # --- Option B: Static IAM Access Keys (Alternative) ---
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Step 5: Sync static assets to S3 bucket
      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      # Step 6: Invalidate CloudFront CDN Cache (for updates to take effect immediately)
      # - name: Invalidate CloudFront Cache
      #   if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != null && secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
      #   run: |
      #     aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
